services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: howzero
      POSTGRES_USER: howzero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-howzero_dev_2026}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-howzero_redis_2026} --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
