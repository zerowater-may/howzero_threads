<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>seoul-10y 07</title>
<link rel="stylesheet" href="../../../../../../.claude/skills/zipsaja-design/colors_and_type.css">
<style>
  /* Slide chrome — 자체완결 (zipsaja-design slide.css에 의존하지 않음) */
  html, body { margin: 0; padding: 0; background: var(--zs-page); }
  .zs-slide {
    position: relative;
    width: 1080px; height: 1440px;
    background: var(--zs-page);     /* 베이지 캔버스 */
    box-sizing: border-box;
    overflow: hidden;
    margin: 0 auto;
    font-family: var(--ff-body);
    color: var(--fg-1);
  }
  /* Page number tag (top-right) */
  .zs-num {
    position: absolute; top: 50px; right: 80px;
    font-family: var(--ff-headline); font-size: 28px;
    background: var(--zs-yellow);
    border: 3px solid var(--zs-ink);
    border-radius: 999px;
    padding: 4px 18px;
    color: var(--zs-ink);
    z-index: 10;
  }
  /* Footer (bottom — fixed) */
  .zs-foot {
    position: absolute; left: 80px; right: 80px; bottom: 50px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--ff-headline); font-size: 22px;
    color: var(--fg-3);
    z-index: 5;
  }
  .zs-foot .handle b {
    font-family: var(--ff-body); font-weight: 700; font-size: 22px;
    color: var(--zs-ink);
  }
  .zs-foot .right { display: flex; align-items: center; gap: 12px; font-size: 24px; }
  .zs-foot .pg { color: var(--fg-3); }
</style>

<style>
  .cta-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:100px 60px; background:var(--zs-ink); color:#fff; }
  .cta-handle { font-family: var(--ff-headline); font-size:120px; color:var(--zs-yellow); margin-bottom:24px; }
  .cta-msg { font-family: var(--ff-body); font-weight:700; font-size:48px; text-align:center; color:#fff; }
  .zs-foot { color: rgba(255,255,255,0.7); }
  .zs-foot b { color: #fff; }
</style>

</head>
<body>
<section class="zs-slide" data-screen-label="07 cta">
  <div class="zs-num">07</div>
  
<div class="cta-wrap">
  <div class="cta-handle">@zipsaja</div>
  <div class="cta-msg">더 자세한 데이터는 DM</div>
</div>

  <div class="zs-foot">
    <div class="handle"><b>@zipsaja · 서울 300세대+ 1,377단지 · 활성 매물 42,048건 · 2026-04-23 기준</b></div>
    <div class="right"><span class="pg">7 / 7</span><span>→</span></div>
  </div>
</section>
</body>
</html>
