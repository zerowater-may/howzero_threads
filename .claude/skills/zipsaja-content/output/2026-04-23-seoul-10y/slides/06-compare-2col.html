<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>seoul-10y 06</title>
<link rel="stylesheet" href="../../../../../../.claude/skills/zipsaja-design/colors_and_type.css">
<style>
  /* Slide chrome — 자체완결 (zipsaja-design slide.css에 의존하지 않음) */
  html, body { margin: 0; padding: 0; background: var(--zs-page); }
  .zs-slide {
    position: relative;
    width: 1080px; height: 1440px;
    background: var(--zs-page);     /* 베이지 캔버스 */
    box-sizing: border-box;
    overflow: hidden;
    margin: 0 auto;
    font-family: var(--ff-body);
    color: var(--fg-1);
  }
  /* Page number tag (top-right) */
  .zs-num {
    position: absolute; top: 50px; right: 80px;
    font-family: var(--ff-headline); font-size: 28px;
    background: var(--zs-yellow);
    border: 3px solid var(--zs-ink);
    border-radius: 999px;
    padding: 4px 18px;
    color: var(--zs-ink);
    z-index: 10;
  }
  /* Footer (bottom — fixed) */
  .zs-foot {
    position: absolute; left: 80px; right: 80px; bottom: 50px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--ff-headline); font-size: 22px;
    color: var(--fg-3);
    z-index: 5;
  }
  .zs-foot .handle b {
    font-family: var(--ff-body); font-weight: 700; font-size: 22px;
    color: var(--zs-ink);
  }
  .zs-foot .right { display: flex; align-items: center; gap: 12px; font-size: 24px; }
  .zs-foot .pg { color: var(--fg-3); }
</style>

<style>
  .c2-head { padding: 80px 60px 24px; }
  .c2-head h1 { font-family: var(--ff-headline); font-size: 60px; margin:0; }
  .c2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 24px 60px; }
  .c2-cell { background: var(--zs-cream); border: 3px solid var(--zs-ink); border-radius: 16px; padding: 60px 32px; text-align: center; box-shadow: 4px 4px 0 0 var(--zs-ink); }
  .c2-cell.right { background: var(--zs-yellow); }
  .c2-label { font-family: var(--ff-headline); font-size: 48px; }
  .c2-value { font-family: var(--ff-headline); font-size: 110px; color: var(--zs-ink); margin-top: 16px; line-height:1; }
  .c2-sub { padding: 32px 60px 0; font-family: var(--ff-body); font-weight: 700; font-size: 36px; color: var(--fg-2); text-align:center; }
</style>

</head>
<body>
<section class="zs-slide" data-screen-label="06 compare-2col">
  <div class="zs-num">06</div>
  
<div class="c2-head"><h1>10년 양극화</h1></div>
<div class="c2-grid">
  <div class="c2-cell">
    <div class="c2-label">용산</div>
    <div class="c2-value">3.13배</div>
  </div>
  <div class="c2-cell right">
    <div class="c2-label">도봉</div>
    <div class="c2-value">1.88배</div>
  </div>
</div>
<div class="c2-sub">격차 1.7배 더 벌어짐</div>

  <div class="zs-foot">
    <div class="handle"><b>@zipsaja · 서울 300세대+ 1,377단지 · 활성 매물 42,048건 · 2026-04-23 기준</b></div>
    <div class="right"><span class="pg">6 / 7</span><span>→</span></div>
  </div>
</section>
</body>
</html>
