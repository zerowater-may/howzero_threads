<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>seoul-10y 03</title>
<link rel="stylesheet" href="../../../../../../.claude/skills/zipsaja-design/colors_and_type.css">
<style>
  /* Slide chrome — 자체완결 (zipsaja-design slide.css에 의존하지 않음) */
  html, body { margin: 0; padding: 0; background: var(--zs-page); }
  .zs-slide {
    position: relative;
    width: 1080px; height: 1440px;
    background: var(--zs-page);     /* 베이지 캔버스 */
    box-sizing: border-box;
    overflow: hidden;
    margin: 0 auto;
    font-family: var(--ff-body);
    color: var(--fg-1);
  }
  /* Page number tag (top-right) */
  .zs-num {
    position: absolute; top: 50px; right: 80px;
    font-family: var(--ff-headline); font-size: 28px;
    background: var(--zs-yellow);
    border: 3px solid var(--zs-ink);
    border-radius: 999px;
    padding: 4px 18px;
    color: var(--zs-ink);
    z-index: 10;
  }
  /* Footer (bottom — fixed) */
  .zs-foot {
    position: absolute; left: 80px; right: 80px; bottom: 50px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--ff-headline); font-size: 22px;
    color: var(--fg-3);
    z-index: 5;
  }
  .zs-foot .handle b {
    font-family: var(--ff-body); font-weight: 700; font-size: 22px;
    color: var(--zs-ink);
  }
  .zs-foot .right { display: flex; align-items: center; gap: 12px; font-size: 24px; }
  .zs-foot .pg { color: var(--fg-3); }
</style>

<style>
  .rb-head { padding: 80px 60px 32px; }
  .rb-head h1 { font-family: var(--ff-headline); font-size: 64px; margin: 0; }
  .rb-list { padding: 0 60px; }
  .rb-row { display: grid; grid-template-columns: 80px 200px 1fr 200px; gap: 16px; align-items: center; padding: 18px 0; border-top: 2px solid var(--zs-ink); }
  .rb-row:last-child { border-bottom: 2px solid var(--zs-ink); }
  .rb-rank { font-family: var(--ff-headline); font-size: 56px; color: var(--zs-yellow); }
  .rb-name { font-family: var(--ff-headline); font-size: 48px; }
  .rb-bar  { height: 36px; background: var(--zs-yellow); border: 3px solid var(--zs-ink); border-radius: 8px; }
  .rb-val  { font-family: var(--ff-headline); font-size: 44px; text-align: right; }
</style>

</head>
<body>
<section class="zs-slide" data-screen-label="03 rank-bar">
  <div class="zs-num">03</div>
  
<div class="rb-head"><h1>TOP 5 — 10년 상승률</h1></div>
<div class="rb-list">
  
  <div class="rb-row">
    <div class="rb-rank">1</div>
    <div class="rb-name">용산</div>
    <div><div class="rb-bar" style="width: 100.0%;"></div></div>
    <div class="rb-val">3.13</div>
  </div>
  
  <div class="rb-row">
    <div class="rb-rank">2</div>
    <div class="rb-name">성동</div>
    <div><div class="rb-bar" style="width: 99.4%;"></div></div>
    <div class="rb-val">3.11</div>
  </div>
  
  <div class="rb-row">
    <div class="rb-rank">3</div>
    <div class="rb-name">광진</div>
    <div><div class="rb-bar" style="width: 93.3%;"></div></div>
    <div class="rb-val">2.92</div>
  </div>
  
  <div class="rb-row">
    <div class="rb-rank">4</div>
    <div class="rb-name">서초</div>
    <div><div class="rb-bar" style="width: 91.4%;"></div></div>
    <div class="rb-val">2.86</div>
  </div>
  
  <div class="rb-row">
    <div class="rb-rank">5</div>
    <div class="rb-name">강동</div>
    <div><div class="rb-bar" style="width: 91.1%;"></div></div>
    <div class="rb-val">2.85</div>
  </div>
  
</div>

  <div class="zs-foot">
    <div class="handle"><b>@zipsaja · 서울 300세대+ 1,377단지 · 활성 매물 42,048건 · 2026-04-23 기준</b></div>
    <div class="right"><span class="pg">3 / 7</span><span>→</span></div>
  </div>
</section>
</body>
</html>
