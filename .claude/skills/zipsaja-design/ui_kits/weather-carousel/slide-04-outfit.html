<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>04 — Outfit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../carousel/slide.css">
<style>.nowrap{white-space:nowrap;}</style>
</head>
<body>
<section class="zs-slide" data-screen-label="W04 Outfit">
  <div class="zs-num">04</div>

  <div style="font-family:var(--ff-hand);font-weight:700;font-size:40px;color:var(--fg-2);margin-top:50px;">그래서 뭐 입지?</div>
  <h2 style="font-family:var(--ff-headline);font-size:88px;line-height:1.1;margin:18px 0 30px;">
    <span class="zs-hl">얇은 겉옷</span> 하나<br>
    챙기면 완벽
  </h2>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:920px;">
    <div style="background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:22px;padding:26px 30px;box-shadow:var(--shadow-stamp-sm);">
      <div style="display:inline-block;white-space:nowrap;font-family:var(--ff-headline);font-size:26px;background:var(--zs-ink);color:#fff;padding:4px 16px;border-radius:8px;margin-bottom:16px;letter-spacing:0.06em;">MORNING · 11°</div>
      <div style="font-family:var(--ff-body);font-weight:700;font-size:28px;line-height:1.5;">
        가디건 · 얇은 니트<br>
        긴바지 · 스니커즈
      </div>
    </div>
    <div style="background:var(--zs-yellow);border:3px solid var(--zs-ink);border-radius:22px;padding:26px 30px;box-shadow:var(--shadow-stamp-sm);">
      <div style="display:inline-block;white-space:nowrap;font-family:var(--ff-headline);font-size:26px;background:var(--zs-ink);color:#fff;padding:4px 16px;border-radius:8px;margin-bottom:16px;letter-spacing:0.06em;">NOON · 22°</div>
      <div style="font-family:var(--ff-body);font-weight:700;font-size:28px;line-height:1.5;">
        반팔 티셔츠<br>
        얇은 셔츠 + 청바지
      </div>
    </div>
  </div>

  <div style="margin-top:28px;background:var(--zs-white);border:3px dashed var(--zs-ink);border-radius:18px;padding:22px 26px;max-width:920px;">
    <div style="font-family:var(--ff-hand);font-weight:700;font-size:24px;color:var(--fg-3);margin-bottom:6px;">같이 챙기면 좋은 거</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <span class="nowrap" style="font-family:var(--ff-body);font-weight:700;font-size:22px;padding:6px 16px;border:3px solid var(--zs-ink);border-radius:8px;background:var(--zs-cream);">선글라스</span>
      <span class="nowrap" style="font-family:var(--ff-body);font-weight:700;font-size:22px;padding:6px 16px;border:3px solid var(--zs-ink);border-radius:8px;background:var(--zs-white);">가벼운 스카프</span>
      <span class="nowrap" style="font-family:var(--ff-body);font-weight:700;font-size:22px;padding:6px 16px;border:3px solid var(--zs-ink);border-radius:8px;background:var(--zs-yellow);">마스크</span>
    </div>
  </div>

  <div style="position:absolute;left:80px;bottom:230px;display:flex;align-items:flex-end;gap:18px;">
    <img src="../../assets/mascots/mascot-side.png" style="width:200px;height:200px;">
    <div class="zs-bubble tail-l" style="margin-bottom:30px;">벗기 편한 걸로 골라</div>
  </div>

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">4 / 6</span><span>→</span></div>
  </div>
</section>
</body></html>
