<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>01 — Weather Cover</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../carousel/slide.css">
<style>.nowrap{white-space:nowrap;}</style>
</head>
<body>
<section class="zs-slide" data-screen-label="W01 Cover">
  <div class="zs-num" style="background:#fff;">01</div>

  <div style="font-family:var(--ff-hand);font-weight:700;font-size:42px;color:var(--fg-2);margin-top:60px;">오늘 04 / 21 화요일</div>

  <h1 style="font-family:var(--ff-headline);font-size:128px;line-height:1.02;margin:24px 0 18px;letter-spacing:-1px;">
    오늘<br>
    <span class="nowrap" style="display:inline-block;background:#fff;border:4px solid var(--zs-ink);padding:4px 32px 12px;border-radius:999px;box-shadow:8px 8px 0 0 var(--zs-ink);">서울 날씨</span><br>
    정리해줄게
  </h1>

  <div style="margin-top:40px;display:inline-flex;align-items:baseline;gap:16px;background:var(--zs-white);border:4px solid var(--zs-ink);border-radius:24px;padding:22px 32px;box-shadow:var(--shadow-stamp);">
    <span style="font-family:var(--ff-headline);font-size:140px;line-height:1;">18°</span>
    <div style="display:flex;flex-direction:column;gap:4px;font-family:var(--ff-body);font-weight:700;font-size:26px;line-height:1.2;">
      <span>최고 <b style="font-family:var(--ff-headline);font-size:32px;">22°</b></span>
      <span style="color:var(--fg-3);">최저 <b style="font-family:var(--ff-headline);font-size:32px;color:var(--fg-1);">11°</b></span>
    </div>
  </div>

  <img src="../../assets/mascots/mascot-hero.png"
       style="position:absolute;right:40px;bottom:200px;width:320px;height:320px;">

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">1 / 6</span><span>→</span></div>
  </div>
</section>
</body></html>
