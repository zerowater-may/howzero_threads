<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>02 — Summary</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../carousel/slide.css">
<style>.nowrap{white-space:nowrap;}</style>
</head>
<body>
<section class="zs-slide" data-screen-label="W02 Summary">
  <div class="zs-num">02</div>

  <div style="font-family:var(--ff-hand);font-weight:700;font-size:40px;color:var(--fg-2);margin-top:50px;">한줄로 요약하면</div>
  <h2 style="font-family:var(--ff-headline);font-size:92px;line-height:1.1;margin:20px 0 40px;">
    <span class="zs-hl">봄 같은데</span><br>
    아침엔 쌀쌀함
  </h2>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:920px;">
    <div style="background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:18px;padding:24px 28px;box-shadow:var(--shadow-stamp-sm);">
      <div style="font-family:var(--ff-hand);font-weight:700;font-size:26px;color:var(--fg-3);">날씨</div>
      <div style="font-family:var(--ff-headline);font-size:52px;line-height:1.1;margin-top:6px;">맑음 → 구름</div>
    </div>
    <div style="background:var(--zs-white);border:3px solid var(--zs-ink);border-radius:18px;padding:24px 28px;box-shadow:var(--shadow-stamp-sm);">
      <div style="font-family:var(--ff-hand);font-weight:700;font-size:26px;color:var(--fg-3);">강수확률</div>
      <div style="font-family:var(--ff-headline);font-size:52px;line-height:1.1;margin-top:6px;"><span class="zs-hl">20%</span></div>
    </div>
    <div style="background:var(--zs-white);border:3px solid var(--zs-ink);border-radius:18px;padding:24px 28px;box-shadow:var(--shadow-stamp-sm);">
      <div style="font-family:var(--ff-hand);font-weight:700;font-size:26px;color:var(--fg-3);">미세먼지</div>
      <div style="font-family:var(--ff-headline);font-size:52px;line-height:1.1;margin-top:6px;">보통</div>
    </div>
    <div style="background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:18px;padding:24px 28px;box-shadow:var(--shadow-stamp-sm);">
      <div style="font-family:var(--ff-hand);font-weight:700;font-size:26px;color:var(--fg-3);">바람</div>
      <div style="font-family:var(--ff-headline);font-size:52px;line-height:1.1;margin-top:6px;">3 m/s</div>
    </div>
  </div>

  <div style="position:absolute;left:80px;bottom:240px;display:flex;align-items:flex-end;gap:20px;">
    <img src="../../assets/mascots/mascot-worried.png" style="width:200px;height:200px;">
    <div class="zs-bubble tail-l" style="margin-bottom:30px;">겉옷 하나는 챙기자</div>
  </div>

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">2 / 6</span><span>→</span></div>
  </div>
</section>
</body></html>
