<!doctype html>
<html lang="ko"><head>

<body>
<section class="zs-slide cream" data-screen-label="W05 Caution">
  <div class="zs-num">05</div>

  </h2>

  <div style="display:flex;flex-direction:column;gap:16px;max-width:920px;">
    <div style="display:flex;gap:20px;align-items:flex-start;background:var(--zs-white);border:3px solid var(--zs-ink);border-radius:18px;padding:22px 26px;box-shadow:var(--shadow-stamp-sm);">

      <div>
        <div style="font-family:var(--ff-headline);font-size:40px;line-height:1.15;">아침·낮 <span class="zs-hl">일교차 11°</span></div>

      </div>
    </div>

    <div style="display:flex;gap:20px;align-items:flex-start;background:var(--zs-white);border:3px solid var(--zs-ink);border-radius:18px;padding:22px 26px;box-shadow:var(--shadow-stamp-sm);">

      <div>
        <div style="font-family:var(--ff-headline);font-size:40px;line-height:1.15;"><span class="zs-hl">자외선</span> 지수 높음</div>
        <div style="font-family:var(--ff-body);font-weight:700;font-size:24px;color:var(--fg-3);margin-top:4px;">선크림 · 모자 · 선글라스</div>
      </div>
    </div>

    <div style="display:flex;gap:20px;align-items:flex-start;background:var(--zs-white);border:3px solid var(--zs-ink);border-radius:18px;padding:22px 26px;box-shadow:var(--shadow-stamp-sm);">
      <div style="flex-shrink:0;width:64px;height:64px;border:3px solid var(--zs-ink);border-radius:14px;background:var(--zs-yellow);display:flex;align-items:center;justify-content:center;font-family:var(--ff-headline);font-size:38px;">3</div>
      <div>
        <div style="font-family:var(--ff-headline);font-size:40px;line-height:1.15;">저녁 이후 <span class="zs-hl">구름</span></div>
        <div style="font-family:var(--ff-body);font-weight:700;font-size:24px;color:var(--fg-3);margin-top:4px;">늦은 귀가 시 우산 챙기면 안전</div>
      </div>
    </div>

  <div style="position:absolute;right:60px;bottom:230px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
    <div class="zs-bubble">놓치면 진짜 후회함</div>
    <img src="../../assets/mascots/mascot-angry.png" style="width:200px;height:200px;">

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
