<!doctype html>
<html lang="ko"><head>

<body>
<section class="zs-slide dark" data-screen-label="08 CTA">
  <div style="position:absolute;top:50px;right:80px;font-family:var(--ff-headline);font-size:28px;background:var(--zs-yellow);color:var(--zs-ink);border:3px solid var(--zs-ink);border-radius:999px;padding:4px 18px;">08</div>

  <div style="margin-top:120px;text-align:center;">
    <img src="../../assets/mascots/mascot-hero.png" style="width:240px;height:240px;filter:invert(1);">
    <h2 style="font-family:var(--ff-headline);font-size:88px;line-height:1.22;margin:30px 0 28px;color:#fff;">
      너 조건 맞춰서<br>
      <span style="white-space:nowrap;background:var(--zs-yellow);color:var(--zs-ink);padding:6px 36px 14px;border-radius:999px;display:inline-block;line-height:1;">큐레이션</span><br>

  </div>

  <div style="position:absolute;left:50%;transform:translateX(-50%);bottom:260px;display:flex;gap:18px;white-space:nowrap;">

    <div style="font-family:var(--ff-headline);font-size:36px;white-space:nowrap;background:transparent;color:#fff;border:3px solid #fff;border-radius:18px;padding:18px 48px;">저장하기</div>
  </div>

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png" style="filter:invert(1);"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">10 / 10</span></div>
  </div>
