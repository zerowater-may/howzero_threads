<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>G05 — Yearly</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../carousel/slide.css">
</head>
<body>
<section class="zs-slide" data-screen-label="G05 Yearly">
  <div class="zs-num">05</div>

  <div style="font-family:var(--ff-hand);font-weight:700;font-size:40px;color:var(--fg-3);margin-top:50px;">연도별 실거래 흐름</div>
  <h2 style="font-family:var(--ff-headline);font-size:74px;line-height:1.1;margin:14px 0 28px;">
    대표 단지<br>
    <span class="zs-pill" style="font-size:74px;padding:4px 22px 10px;white-space:nowrap;">가양2단지성지 34A</span>
  </h2>

  <!-- Line chart as bars -->
  <div class="zs-box" style="padding:28px 24px 24px;">
    <div style="font-family:var(--ff-headline);font-size:24px;color:var(--fg-3);margin-bottom:14px;">(단위: 억)</div>

    <div style="position:relative;height:340px;display:flex;align-items:flex-end;gap:10px;padding:0 4px;border-bottom:3px solid var(--zs-ink);">
      <!-- 2017 2.67, 2019 3.38, 2021 5.92, 2022 6.3, 2023 4.87, 2025 5.18, 2026 6.53 -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;">2.7</div>
        <div style="width:100%;height:98px;background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;">3.4</div>
        <div style="width:100%;height:124px;background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;">5.9</div>
        <div style="width:100%;height:217px;background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;">6.3</div>
        <div style="width:100%;height:231px;background:var(--zs-ink);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">4.9</div>
        <div style="width:100%;height:179px;background:var(--zs-cream-soft);border:3px dashed var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:22px;">5.2</div>
        <div style="width:100%;height:190px;background:var(--zs-cream);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-family:var(--ff-headline);font-size:26px;"><b style="background:var(--zs-yellow);border:3px solid var(--zs-ink);border-radius:6px;padding:0 6px;">6.5</b></div>
        <div style="width:100%;height:240px;background:var(--zs-yellow);border:3px solid var(--zs-ink);border-radius:6px 6px 0 0;"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;padding:0 4px;">
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">'17</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">'19</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">'21</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;">'22</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">'23</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;color:var(--fg-3);">'25</div>
      <div style="flex:1;text-align:center;font-family:var(--ff-headline);font-size:22px;"><b>'26</b></div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;margin-top:30px;max-width:880px;">
    <div class="zs-box-check" style="padding:18px 24px;">
      <span style="font-family:var(--ff-headline);font-size:32px;">22년 정점 → 23년 조정 → <span class="zs-hl">2026 재돌파</span></span>
    </div>
    <div class="zs-box-check" style="padding:18px 24px;">
      <span style="font-family:var(--ff-headline);font-size:32px;">호가는 이미 <b>7억</b> 넘김</span>
    </div>
  </div>

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">5 / 10</span><span>→</span></div>
  </div>
</section>
</body></html>
