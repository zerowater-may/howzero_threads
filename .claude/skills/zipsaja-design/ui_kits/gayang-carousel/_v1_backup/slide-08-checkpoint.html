<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>G08 — Checkpoint</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../carousel/slide.css">
</head>
<body>
<section class="zs-slide" data-screen-label="G08 Checkpoint">
  <div class="zs-num">08</div>

  <div style="font-family:var(--ff-hand);font-weight:700;font-size:40px;color:var(--fg-3);margin-top:50px;">꼭 체크!</div>
  <h2 style="font-family:var(--ff-headline);font-size:92px;line-height:1.1;margin:14px 0 40px;">
    들어가기 전<br>
    <span class="zs-pill" style="font-size:92px;padding:4px 22px 10px;white-space:nowrap;">주의사항</span>
  </h2>

  <div style="display:flex;flex-direction:column;gap:18px;max-width:920px;">
    <div class="zs-box-check" style="padding:22px 28px;">
      <div style="font-family:var(--ff-headline);font-size:34px;line-height:1.3;">
        <b>준공 30년↑ 단지가 대부분</b><br>
        <span style="font-size:26px;color:#fff;opacity:.85;">가양 2·6·9단지, 강변3 · 1990~93년</span>
      </div>
    </div>
    <div class="zs-box zs-stamp-sm" style="padding:22px 28px;">
      <div style="font-family:var(--ff-headline);font-size:34px;line-height:1.3;">
        재건축 기대감 이미 반영<br>
        <span style="font-size:26px;color:var(--fg-3);">상승률 상위 = 재건축 프리미엄</span>
      </div>
    </div>
    <div class="zs-box zs-stamp-sm" style="padding:22px 28px;">
      <div style="font-family:var(--ff-headline);font-size:34px;line-height:1.3;">
        매물수 편차가 큼<br>
        <span style="font-size:26px;color:var(--fg-3);">1~17건 · 일부 평형 1~2건 뿐</span>
      </div>
    </div>
    <div class="zs-box zs-stamp-sm" style="padding:22px 28px;">
      <div style="font-family:var(--ff-headline);font-size:34px;line-height:1.3;">
        전세 갭 비율 <span class="zs-hl">47~72%</span><br>
        <span style="font-size:26px;color:var(--fg-3);">투자금 여유 확인 필수</span>
      </div>
    </div>
  </div>

  <div style="position:absolute;right:60px;bottom:220px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
    <div class="zs-bubble">숫자만 보면 안돼</div>
    <img src="../../assets/mascots/mascot-angry.png" style="width:190px;height:190px;">
  </div>

  <div class="zs-foot">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div class="right"><span class="pg">8 / 10</span><span>→</span></div>
  </div>
</section>
</body></html>
