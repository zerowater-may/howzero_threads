<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>G10 — CTA</title>
<link rel="stylesheet" href="zipsaja.css">
</head>
<body>
<section class="zj-slide dark" data-screen-label="10 CTA">
  <div class="zj-num">10</div>

  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-top:120px;">
    <img src="../../assets/mascots/mascot-hero.png" class="zj-mascot invert" style="width:340px;">

    <div class="zj-kicker" style="color:#F5EDE0;margin-top:20px;">여기까지 봐줘서 고마워</div>

    <h2 class="zj-head" style="color:#fff;font-size:110px;line-height:1.08;margin:20px 0 36px;">
      저장하고<br>
      <span class="zj-pill" style="font-size:110px;padding:8px 40px 16px;">다시 봐</span>
    </h2>

    <div style="font-family:var(--ff-head);font-size:38px;color:#F5EDE0;line-height:1.5;">
      매주 <span style="color:var(--zj-orange);">동네 1곳</span>씩 뜯어봐줄게<br>
      놓치지 말고 팔로우 해두기!
    </div>

    <div style="display:flex;gap:16px;margin-top:56px;">
      <div style="background:var(--zj-orange);color:#fff;border:3px solid #fff;border-radius:999px;padding:16px 38px;font-family:var(--ff-head);font-size:38px;">
        저장하기
      </div>
      <div style="background:#fff;color:var(--zj-dark);border:3px solid #fff;border-radius:999px;padding:16px 38px;font-family:var(--ff-head);font-size:38px;">
        공유하기
      </div>
      <div style="background:transparent;color:#fff;border:3px solid #fff;border-radius:999px;padding:16px 38px;font-family:var(--ff-head);font-size:38px;">
        팔로우
      </div>
    </div>
  </div>

  <div class="zj-foot" style="color:#fff;">
    <div class="handle"><img src="../../assets/mascots/mascot-blank.png"><b>@zipsaja</b></div>
    <div style="opacity:.7;">가양동 편 · end</div>
  </div>
</section>
</body></html>
