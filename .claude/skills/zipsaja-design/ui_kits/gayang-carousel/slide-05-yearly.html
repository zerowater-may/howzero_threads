<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>G05 — Yearly</title>
<link rel="stylesheet" href="zipsaja.css">
</head>
<body>

    <div style="position:relative;height:340px;display:flex;align-items:flex-end;gap:10px;padding:0 4px;border-bottom:3px solid var(--zj-dark);">

        <div style="font-family:var(--ff-head);font-size:22px;">2.7</div>

    </div>
