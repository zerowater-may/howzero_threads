<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>00 — Cover</title>
<link rel="stylesheet" href="comic.css">
</head>
<body>
<section class="hd-slide" data-screen-label="00 Cover">

  <h1 style="font-family:var(--ff-head);font-weight:900;font-size:128px;line-height:1.05;margin:40px 0 0;letter-spacing:-3px;">
    주변에<br>
    AI 광인들<br>
    특징 모음
  </h1>

  <!-- 중단 대사 -->
  <div class="hd-line" style="top:720px;left:60px;font-weight:700;font-size:42px;line-height:1.3;">

  <!-- 거대한 남편 얼굴 (왼쪽 아래) - 기괴하게 클로즈업 -->
  <svg style="position:absolute;left:-80px;bottom:-40px;width:780px;" viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg">

    <path d="M 60 600 C 20 400, 100 120, 380 80 C 620 60, 740 300, 720 480 C 710 570, 680 620, 650 620 L 60 620 Z"
          fill="white" stroke="#141414" stroke-width="4" stroke-linejoin="round"/>

    <path d="M 300 360 Q 340 340 380 360" fill="none" stroke="#141414" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 440 360 Q 480 340 520 360" fill="none" stroke="#141414" stroke-width="3.5" stroke-linecap="round"/>

    <ellipse cx="340" cy="380" rx="55" ry="40" fill="none" stroke="#141414" stroke-width="3.5"/>
    <ellipse cx="480" cy="380" rx="55" ry="40" fill="none" stroke="#141414" stroke-width="3.5"/>
    <line x1="395" y1="380" x2="425" y2="380" stroke="#141414" stroke-width="3"/>
    <!-- 야릇한 미소 -->
    <path d="M 310 470 Q 400 515 490 470" fill="none" stroke="#141414" stroke-width="4" stroke-linecap="round"/>
    <!-- 웃음 주름 -->
    <path d="M 280 440 Q 290 450 300 450" fill="none" stroke="#141414" stroke-width="2"/>
    <path d="M 520 440 Q 510 450 500 450" fill="none" stroke="#141414" stroke-width="2"/>
  </svg>

  <!-- 우측 중앙 아내 + 작은 친구 -->
  <svg style="position:absolute;right:100px;top:660px;width:240px;" viewBox="0 0 240 280">
    <!-- 아내 (리본) -->
    <path d="M 70 50 C 30 60, 25 170, 50 220 C 70 260, 130 250, 130 195 C 135 120, 115 45, 70 50 Z"
          fill="white" stroke="#141414" stroke-width="3.5" stroke-linejoin="round"/>
    <circle cx="55" cy="130" r="3" fill="#141414"/>
    <circle cx="85" cy="130" r="3" fill="#141414"/>
    <!-- 아내 리본 -->
    <path d="M 65 45 L 38 30 L 42 55 Z" fill="#E5192E" stroke="#141414" stroke-width="2"/>
    <path d="M 75 45 L 100 28 L 95 55 Z" fill="#E5192E" stroke="#141414" stroke-width="2"/>
    <circle cx="70" cy="43" r="4" fill="#E5192E" stroke="#141414" stroke-width="2"/>

    <!-- 옆 친구 (작게, 리본 없음) -->
    <path d="M 150 100 C 120 105, 118 180, 138 215 C 155 245, 200 240, 205 200 C 212 150, 190 95, 150 100 Z"
          fill="white" stroke="#141414" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="155" cy="155" r="2.5" fill="#141414"/>
    <circle cx="180" cy="155" r="2.5" fill="#141414"/>
    <path d="M 158 175 Q 168 180 178 175" fill="none" stroke="#141414" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <!-- 아내 대사 (작게, 오른쪽) -->
  <div class="hd-line sm" style="top:880px;right:60px;text-align:right;">
    스스로의 육아 전문성은<br>
    어떻다고 생각하시는지?
  </div>

  <!-- 하단 대사 - API rate limit -->
  <div class="hd-line" style="bottom:80px;right:60px;text-align:right;font-size:40px;font-weight:700;">
    API rate limit:<br>
    return 5:00 PM
  </div>

  <div class="hd-num" style="right:auto;left:60px;">daily_ai_toon</div>
</section>
</body></html>
