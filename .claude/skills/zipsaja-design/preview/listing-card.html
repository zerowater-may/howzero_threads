<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Listing Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--zs-page);font-family:var(--ff-body);}
.card{background:#fff;border:3px solid var(--zs-ink);border-radius:16px;padding:18px 22px;box-shadow:var(--shadow-stamp-sm);max-width:540px;}
.head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.idx{font-family:var(--ff-headline);font-size:22px;background:var(--zs-yellow);border:2px solid var(--zs-ink);border-radius:999px;padding:0 14px;line-height:1.4;}
.price{font-family:var(--ff-headline);font-size:30px;}
.title{font-family:var(--ff-headline);font-size:24px;margin-bottom:4px;}
.spec{font-weight:700;font-size:14px;color:var(--fg-2);}
.tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-family:var(--ff-body);font-weight:700;font-size:12px;padding:3px 10px;border:2px solid var(--zs-ink);border-radius:8px;background:var(--zs-cream);}
</style></head>
<body>
  <div class="card">
    <div class="head"><div class="idx">매물 #2</div><div class="price">4억 8천</div></div>
    <div class="title">상계주공 7단지 · 전용 59㎡</div>
    <div class="spec">노원구 상계동 · 4호선 노원역 도보 6분</div>
    <div class="tags"><div class="tag">역세권</div><div class="tag">신혼가능</div><div class="tag">즉시입주</div></div>
  </div>
</body></html>
