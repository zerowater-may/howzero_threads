<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#fff;}
body{padding:24px;font-family:var(--ff-body);display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.logo{display:inline-flex;align-items:center;gap:14px;border:3px solid var(--zs-ink);border-radius:14px;padding:10px 18px;background:var(--zs-yellow);box-shadow:var(--shadow-stamp-sm);width:max-content;}
.logo img{width:64px;height:64px;flex-shrink:0;}
.logo .txt{display:flex;flex-direction:column;}
.name{font-family:var(--ff-headline);font-size:34px;line-height:1;white-space:nowrap;}
.handle{font-family:var(--ff-body);font-weight:700;font-size:14px;color:var(--fg-2);margin-top:4px;white-space:nowrap;}
</style></head>
<body>
  <div class="logo">
    <img src="../assets/mascots/mascot-hero.png">
    <div class="txt"><div class="name">집사자</div><div class="handle">@zipsaja</div></div>
  </div>
</body></html>
