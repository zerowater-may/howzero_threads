<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Boxes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--zs-page);font-family:var(--ff-body);display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.lab{font-family:var(--ff-body);font-weight:700;font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.zs-box,.zs-box-cream,.zs-box-check{padding:14px 18px !important;}
.t{font-family:var(--ff-headline);font-size:20px;}
.s{font-family:var(--ff-body);font-weight:700;font-size:12px;color:var(--fg-2);margin-top:4px;}
</style></head>
<body>
  <div><div class="lab">.zs-box</div><div class="zs-box zs-stamp-sm"><div class="t">기본 박스</div><div class="s">흰 배경 + 3px 검은 테두리</div></div></div>
  <div><div class="lab">.zs-box-cream</div><div class="zs-box-cream zs-stamp-sm"><div class="t">크림 정보 박스</div><div class="s">매물 스펙 / 부가 정보용</div></div></div>
  <div><div class="lab">.zs-box-check</div><div class="zs-box-check zs-stamp-sm"><div class="t">CHECK POINT</div><div class="s">슬라이드당 1개</div></div></div>
</body></html>
