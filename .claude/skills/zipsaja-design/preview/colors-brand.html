<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--ff-body);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .sw{border:2px solid var(--zs-ink);border-radius:12px;overflow:hidden;}
  .chip{height:90px;}
  .info{padding:8px 10px;background:#fff;}
  .name{font-weight:700;font-size:13px;}
  .hex{font-size:11px;color:var(--fg-3);font-weight:700;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--zs-yellow);"></div><div class="info"><div class="name">Yellow</div><div class="hex">#FFD43B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-yellow-deep);"></div><div class="info"><div class="name">Yellow Deep</div><div class="hex">#F5C518</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-orange);"></div><div class="info"><div class="name">Orange</div><div class="hex">#F26A1F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-orange-deep);"></div><div class="info"><div class="name">Orange Deep</div><div class="hex">#C7501A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-cream);"></div><div class="info"><div class="name">Cream</div><div class="hex">#FFF4D6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-ink);"></div><div class="info"><div class="name">Ink</div><div class="hex">#1A1A1A</div></div></div>
  </div>
</body></html>
