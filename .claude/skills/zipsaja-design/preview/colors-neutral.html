<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Colors — Neutral & Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--ff-body);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .sw{border:2px solid var(--zs-ink);border-radius:12px;overflow:hidden;}
  .chip{height:90px;}
  .info{padding:8px 10px;background:#fff;}
  .name{font-weight:700;font-size:13px;}
  .hex{font-size:11px;color:var(--fg-3);font-weight:700;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--zs-white);border-bottom:1px solid #eee;"></div><div class="info"><div class="name">Canvas</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-page);"></div><div class="info"><div class="name">Page</div><div class="hex">#F7F4EC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-cream-soft);"></div><div class="info"><div class="name">Cream Soft</div><div class="hex">#FFFBEB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-ink-soft);"></div><div class="info"><div class="name">Ink Soft</div><div class="hex">#2B2B2B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-ink-mute);"></div><div class="info"><div class="name">Ink Mute</div><div class="hex">#6B6B6B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--zs-ink-faint);"></div><div class="info"><div class="name">Ink Faint</div><div class="hex">#B5B5B5</div></div></div>
  </div>
</body></html>
