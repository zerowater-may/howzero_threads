<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--ff-body);}
  .row{display:grid;grid-template-columns:80px 60px 1fr;gap:14px;align-items:center;padding:6px 0;}
  .tok{font-weight:700;font-size:13px;}
  .px{font-size:12px;color:var(--fg-3);font-weight:700;}
  .bar{height:14px;background:var(--zs-yellow);border:2px solid var(--zs-ink);}
</style></head>
<body>
  <div class="row"><div class="tok">--sp-1</div><div class="px">4px</div><div class="bar" style="width:4px;"></div></div>
  <div class="row"><div class="tok">--sp-2</div><div class="px">8px</div><div class="bar" style="width:8px;"></div></div>
  <div class="row"><div class="tok">--sp-3</div><div class="px">12px</div><div class="bar" style="width:12px;"></div></div>
  <div class="row"><div class="tok">--sp-4</div><div class="px">16px</div><div class="bar" style="width:16px;"></div></div>
  <div class="row"><div class="tok">--sp-5</div><div class="px">24px</div><div class="bar" style="width:24px;"></div></div>
  <div class="row"><div class="tok">--sp-6</div><div class="px">32px</div><div class="bar" style="width:32px;"></div></div>
  <div class="row"><div class="tok">--sp-7</div><div class="px">48px</div><div class="bar" style="width:48px;"></div></div>
  <div class="row"><div class="tok">--sp-8</div><div class="px">64px</div><div class="bar" style="width:64px;"></div></div>
  <div class="row"><div class="tok">--sp-9</div><div class="px">96px</div><div class="bar" style="width:96px;"></div></div>
</body></html>
