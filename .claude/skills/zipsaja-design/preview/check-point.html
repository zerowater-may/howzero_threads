<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Check Point</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--ff-body);}
.box{background:var(--zs-orange);color:#fff;border:3px solid var(--zs-ink);border-radius:16px;padding:18px 24px;box-shadow:var(--shadow-stamp-sm);max-width:560px;}
.label{display:inline-block;font-family:var(--ff-headline);font-size:18px;background:#fff;color:var(--zs-ink);padding:2px 12px;border-radius:8px;margin-bottom:10px;}
.title{font-family:var(--ff-headline);font-size:28px;line-height:1.25;}
.row{margin-top:10px;font-weight:700;font-size:15px;display:flex;gap:8px;align-items:flex-start;}
.row::before{content:"✓";font-family:var(--ff-headline);}
</style></head>
<body>
  <div class="box">
    <div class="label">CHECK POINT</div>
    <div class="title">계약 전에 무조건 확인할 3가지</div>
    <div class="row">등기부등본 — 근저당·압류 여부</div>
    <div class="row">관리비 내역 — 평균 vs 이번 달</div>
    <div class="row">실거래가 — 같은 단지 최근 6개월</div>
  </div>
</body></html>
