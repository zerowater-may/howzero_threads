<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Tags & Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--ff-body);display:flex;flex-direction:column;gap:14px;}
.lab{font-family:var(--ff-body);font-weight:700;font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:1px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{font-weight:700;font-size:13px;padding:4px 12px;border:2px solid var(--zs-ink);border-radius:8px;background:#fff;}
.tag.cream{background:var(--zs-cream);}
.tag.yellow{background:var(--zs-yellow);}
.tag.dark{background:var(--zs-ink);color:#fff;}
.btn{font-family:var(--ff-headline);font-size:20px;padding:10px 22px;border:3px solid var(--zs-ink);border-radius:14px;background:var(--zs-yellow);box-shadow:var(--shadow-stamp-sm);cursor:pointer;}
.btn.dark{background:var(--zs-ink);color:#fff;}
.btn.ghost{background:#fff;}
</style></head>
<body>
  <div><div class="lab">Tags</div><div class="row"><span class="tag">역세권</span><span class="tag cream">신혼가능</span><span class="tag yellow">추천</span><span class="tag dark">매물 #1</span></div></div>
  <div><div class="lab">Buttons (CTA)</div><div class="row"><button class="btn">DM 으로 자세히 →</button><button class="btn dark">팔로우</button><button class="btn ghost">저장</button></div></div>
</body></html>
