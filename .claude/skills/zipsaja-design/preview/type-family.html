<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<title>Type — Family</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#fff; padding:24px 28px; }
  .row { display:flex; gap:32px; align-items:baseline; padding: 12px 0; border-bottom:1px solid #EEE; }
  .row:last-child { border-bottom:0; }
  .lab { width: 110px; font-family: var(--ff-body); font-weight:700; font-size: 12px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 1px; }
  .meta { width: 180px; font-family: var(--ff-body); font-size: 13px; color: var(--fg-3); }
  .sample { flex:1; }
</style></head>
<body>
  <div class="row">
    <div class="lab">Headline</div>
    <div class="meta">Gmarket Sans · Bold 700</div>
    <div class="sample" style="font-family:var(--ff-headline); font-weight:700; font-size:42px; line-height:1.1;">집사자가 정리해줄게</div>
  </div>
  <div class="row">
    <div class="lab">Body</div>
    <div class="meta">Gmarket Sans · Medium 500</div>
    <div class="sample" style="font-family:var(--ff-body); font-weight:500; font-size:24px;">5억 이하 신혼집을 발품 팔아 골랐어</div>
  </div>
  <div class="row">
    <div class="lab">Hand</div>
    <div class="meta">Gaegu · 700</div>
    <div class="sample" style="font-family:var(--ff-hand); font-weight:700; font-size:30px;">이거 진짜 괜찮아</div>
  </div>
</body></html>
