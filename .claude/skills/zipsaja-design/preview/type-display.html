<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Type — Display Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:#fff; padding:20px 28px; font-family: var(--ff-body); }
  .row { display:grid; grid-template-columns: 110px 1fr; gap:20px; align-items:baseline; padding: 8px 0; border-bottom:1px solid #EEE; }
  .row:last-child { border-bottom:0; }
  .meta { font-size: 12px; color: var(--fg-3); font-weight:700; }
  .meta b { display:block; color:var(--fg-1); font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  .sample { font-family: var(--ff-headline); }
</style></head>
<body>
  <div class="row"><div class="meta"><b>HERO</b>120/-1.5</div><div class="sample" style="font-size:60px; line-height:1;">5억 신혼집</div></div>
  <div class="row"><div class="meta"><b>H1</b>96/-1</div><div class="sample" style="font-size:48px; line-height:1.1;">집사자가 골랐어</div></div>
  <div class="row"><div class="meta"><b>H2</b>72/-0.5</div><div class="sample" style="font-size:36px; line-height:1.2;">매물 5개 비교</div></div>
  <div class="row"><div class="meta"><b>H3</b>54</div><div class="sample" style="font-size:28px; line-height:1.2;">동북권 추천 단지</div></div>
  <div class="row"><div class="meta"><b>H4</b>42</div><div class="sample" style="font-size:22px; line-height:1.2;">전용 59㎡ · 역세권 5분</div></div>
</body></html>
