<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Stamp Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--zs-page);font-family:var(--ff-body);display:flex;gap:24px;align-items:center;}
  .demo{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .box{width:160px;height:80px;background:#fff;border:3px solid var(--zs-ink);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-headline);font-size:22px;}
  .lab{font-weight:700;font-size:12px;}
  .meta{font-size:10px;color:var(--fg-3);font-weight:700;text-align:center;}
</style></head>
<body>
  <div class="demo"><div class="box">기본</div><div class="lab">없음</div><div class="meta">no shadow</div></div>
  <div class="demo"><div class="box" style="box-shadow:var(--shadow-stamp-sm);">스탬프 SM</div><div class="lab">--shadow-stamp-sm</div><div class="meta">3px 3px 0 ink</div></div>
  <div class="demo"><div class="box" style="box-shadow:var(--shadow-stamp);">스탬프</div><div class="lab">--shadow-stamp</div><div class="meta">4px 4px 0 ink</div></div>
</body></html>
