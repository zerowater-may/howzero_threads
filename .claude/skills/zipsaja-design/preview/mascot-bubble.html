<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><title>Mascot Bubble</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#fff;}
body{padding:24px;font-family:var(--ff-body);display:flex;align-items:center;gap:24px;}
.mascot{width:140px;height:140px;background:#fff;}
.bubble{position:relative;background:#fff;border:3px solid var(--zs-ink);border-radius:18px;padding:14px 20px;font-family:var(--ff-hand);font-weight:700;font-size:22px;line-height:1.3;box-shadow:var(--shadow-stamp-sm);}
.bubble::before{content:"";position:absolute;left:-14px;top:42%;width:0;height:0;border:10px solid transparent;border-right-color:var(--zs-ink);}
.bubble::after{content:"";position:absolute;left:-9px;top:42%;width:0;height:0;border:8px solid transparent;border-right-color:#fff;}
</style></head>
<body>
  <img class="mascot" src="../assets/mascots/mascot-hero.png" alt="">
  <div class="bubble">발품 팔기 전에 내 정리부터 봐</div>
</body></html>
