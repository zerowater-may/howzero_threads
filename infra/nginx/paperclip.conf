# Paperclip reverse proxy — nginx configuration
# Domain: paperclip.howzero.co (변경 필요)

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=paperclip_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=paperclip_login:10m rate=5r/m;

# Upstream
upstream paperclip_backend {
    server 127.0.0.1:3100;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name paperclip.howzero.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paperclip.howzero.co;

    # SSL certificates (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/paperclip.howzero.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paperclip.howzero.co/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max body size (file uploads)
    client_max_body_size 50M;

    # Login endpoint — strict rate limiting
    location /api/auth/ {
        limit_req zone=paperclip_login burst=3 nodelay;
        proxy_pass http://paperclip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints — moderate rate limiting
    location /api/ {
        limit_req zone=paperclip_api burst=60 nodelay;
        proxy_pass http://paperclip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (heartbeat events)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Static UI assets — cache
    location /assets/ {
        proxy_pass http://paperclip_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else (UI routes)
    location / {
        proxy_pass http://paperclip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
